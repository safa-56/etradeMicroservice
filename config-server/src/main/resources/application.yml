server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/safa-56/etradeMicroservice.git
          search-paths:
            - configs/{application}
          clone-on-start: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
