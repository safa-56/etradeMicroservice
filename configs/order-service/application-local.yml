spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/orderdb
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Kafka'ya yayin order-service tarafinda degil; Debezium (Kafka Connect)
# outbox_events tablosuna yapilan insert'leri "order-created" topic'ine yazar.

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
