spring:
  datasource:
    url: ${ORDER_DB_URL:jdbc:postgresql://localhost:5433/orderdb}
    username: ${ORDER_DB_USERNAME:postgres}
    password: ${ORDER_DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://test-eureka.etiya.com/eureka/
